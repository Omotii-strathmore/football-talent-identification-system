<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Talanta Soka{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root{--bg:#07111f;--panel:rgba(9,18,33,.82);--line:rgba(255,255,255,.12);--text:#edf2f7;--muted:#cbd5e1;--accent:#f59e0b;--accent2:#14b8a6}
        *{box-sizing:border-box}
        body{margin:0;min-height:100vh;font-family:Arial,Helvetica,sans-serif;color:var(--text);background:
            radial-gradient(circle at top left, rgba(245,158,11,.24), transparent 30%),
            radial-gradient(circle at bottom right, rgba(20,184,166,.24), transparent 34%),
            linear-gradient(135deg, #03101d, #08182b 60%, #0c2137)}
        .shell{min-height:100vh;display:grid;place-items:center;padding:32px 16px}
        .card-shell{width:min(100%,760px);padding:28px;border-radius:28px;background:var(--panel);border:1px solid var(--line);backdrop-filter:blur(16px);box-shadow:0 30px 80px rgba(0,0,0,.35)}
        .eyebrow{text-transform:uppercase;letter-spacing:.14em;font-size:.78rem;color:var(--accent)}
        .title{font-size:clamp(2rem,4vw,3.2rem);line-height:1.05;margin:.25rem 0 1rem}
        .lead{color:var(--muted);max-width:58ch;line-height:1.7}
        .links a{color:#fff;text-decoration:none}
        .btn-brand{background:linear-gradient(135deg,var(--accent),#fb7185);border:none;color:#111827;font-weight:700}
        .btn-brand:hover{color:#111827;opacity:.95}
        .auth-note{color:var(--muted);font-size:.96rem}
        .message-list{list-style:none;padding:0;margin:0 0 18px}
        .message-list li{margin-bottom:10px;padding:12px 14px;border-radius:14px;background:rgba(255,255,255,.08);border:1px solid var(--line)}
        .form-control, .form-select{background:rgba(255,255,255,.96)}
    </style>
</head>
<body>
    <div class="shell">
        <main class="card-shell">
            {% if messages %}
                <ul class="message-list">
                    {% for message in messages %}
                        <li>{{ message }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
